name: Train ML Models with MLflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python 3.11.2
        uses: actions/setup-python@v4
        with:
          python-version: "3.11.2"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow scikit-learn pandas numpy

      # Pastikan dataset ada
      # (jika dataset ada di repo, langkah ini aman)
      - name: Check dataset exists
        run: |
          if [ ! -f "CAR DETAILS FROM CAR DEKHO_preprocessed.csv" ]; then
            echo "Dataset not found!"
            exit 1
          else
            echo "Dataset found ✔"
          fi

      # Run training script
      - name: Run ML training
        run: |
          python main.py

      # Upload MLflow artifacts (opsional)
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mlflow-artifacts
          path: mlruns/
